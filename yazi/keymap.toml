# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.

[mgr]

keymap = [
	{ on = "<Esc>", run = "escape",             desc = "Exit visual mode, clear selection, or cancel search" },
	{ on = "<C-[>", run = "escape",             desc = "Exit visual mode, clear selection, or cancel search" },
	{ on = "q",     run = "quit",               desc = "Quit the process" },
	{ on = "Q",     run = "quit --no-cwd-file", desc = "Quit without outputting cwd-file" },
	{ on = "<C-c>", run = "close",              desc = "Close the current tab, or quit if it's last" },
	{ on = "<C-z>", run = "suspend",            desc = "Suspend the process" },

	# Hopping
	{ on = "k", run = "arrow prev", desc = "Previous file" },
	{ on = "j", run = "arrow next", desc = "Next file" },

	{ on = "<Up>",   run = "arrow prev", desc = "Previous file" },
	{ on = "<Down>", run = "arrow next", desc = "Next file" },

	{ on = "<C-u>", run = "arrow -50%",  desc = "Move cursor up half page" },
	{ on = "<C-d>", run = "arrow 50%",   desc = "Move cursor down half page" },
	{ on = "<C-b>", run = "arrow -100%", desc = "Move cursor up one page" },
	{ on = "<C-f>", run = "arrow 100%",  desc = "Move cursor down one page" },

	{ on = "<S-PageUp>",   run = "arrow -50%",  desc = "Move cursor up half page" },
	{ on = "<S-PageDown>", run = "arrow 50%",   desc = "Move cursor down half page" },
	{ on = "<PageUp>",     run = "arrow -100%", desc = "Move cursor up one page" },
	{ on = "<PageDown>",   run = "arrow 100%",  desc = "Move cursor down one page" },

	{ on = [ "g", "g" ], run = "arrow top", desc = "Go to top" },
	{ on = "G",          run = "arrow bot", desc = "Go to bottom" },

	# Navigation
	{ on = "h", run = "leave", desc = "Back to the parent directory" },
	{ on = "l", run = "plugin smart-enter", desc = "Enter the child directory, or open file" },

	{ on = "<Left>",  run = "leave", desc = "Back to the parent directory" },
	{ on = "<Right>", run = "plugin smart-enter", desc = "Enter the child directory, or open file" },

	{ on = "H", run = "back",    desc = "Back to previous directory" },
	{ on = "L", run = "forward", desc = "Forward to next directory" },

	# Toggle
	{ on = "<Space>", run = [ "toggle", "arrow 1" ], desc = "Toggle the current selection state" },
	{ on = "<C-a>",   run = "toggle_all --state=on", desc = "Select all files" },
	{ on = "<C-r>",   run = "toggle_all",            desc = "Invert selection of all files" },

	# Visual mode
	{ on = "v", run = "visual_mode",         desc = "Enter visual mode (selection mode)" },
	{ on = "V", run = "visual_mode --unset", desc = "Enter visual mode (unset mode)" },

	# Seeking
	{ on = "K", run = "seek -5", desc = "Seek up 5 units in the preview" },
	{ on = "J", run = "seek 5",  desc = "Seek down 5 units in the preview" },

	# Spotting
	{ on = "<Tab>", run = "spot", desc = "Spot hovered file" },

	# Operation
	{ on = "o",         run = "open",                        desc = "Open selected files" },
	{ on = "O",         run = "open --interactive",          desc = "Open selected files interactively" },
	{ on = "<Enter>",   run = "open",                        desc = "Open selected files" },
	{ on = "<S-Enter>", run = "open --interactive",          desc = "Open selected files interactively" },
	{ on = "y",         run = [ "yank", "plugin syl-notify -- \"custom\" \"󰌵 Sylphrena\" \"I'll keep this pattern safe for you.\"" ], desc = "Yank selected files (copy)" },
	{ on = "x",         run = [ "yank --cut", "plugin syl-notify -- \"custom\" \"󰌵 Sylphrena\" \"I've gathered these for moving!\"" ], desc = "Yank selected files (cut)" },
	{ on = "p",         run = [ "paste", "plugin syl-notify -- \"custom\" \"󰌵 Sylphrena\" \"Pattern reconstructed!\"" ], desc = "Paste yanked files" },
	{ on = "P",         run = [ "paste --force", "plugin syl-notify -- \"custom\" \"󰌵 Sylphrena\" \"Overwriting the old patterns!\"" ], desc = "Paste yanked files (overwrite if the destination exists)" },
	{ on = "-",         run = "link",                        desc = "Symlink the absolute path of yanked files" },
	{ on = "_",         run = "link --relative",             desc = "Symlink the relative path of yanked files" },
	{ on = "<C-->",     run = "hardlink",                    desc = "Hardlink yanked files" },
	{ on = "Y",         run = "unyank",                      desc = "Cancel the yank status" },
	{ on = "X",         run = "unyank",                      desc = "Cancel the yank status" },
	{ on = "d",         run = [ "remove", "plugin syl-notify -- \"custom\" \"󰌵 Sylphrena\" \"Gone! Like ash in a highstorm.\"" ], desc = "Trash selected files" },
	{ on = "D",         run = "remove --permanently",        desc = "Permanently delete selected files" },
	{ on = "a",         run = "create",                      desc = "Create a file (ends with / for directories)" },
	{ on = [ "r", "n"], run = "rename --cursor=before_ext",  desc = "Rename selected file(s)" },
    { on = ["r", "s"],  run = "plugin run-with",             desc = "Run Shell Files in Batch"},
	{ on = ";",         run = "shell --interactive",         desc = "Run a shell command" },
	{ on = ":",         run = "shell --block --interactive", desc = "Run a shell command (block until finishes)" },
	{ on = ".",         run = "hidden toggle",               desc = "Toggle the visibility of hidden files" },
	{ on = "s",         run = "search --via=fd",             desc = "Search files by name via fd" },
	{ on = "S",         run = "search --via=rg",             desc = "Search files by content via ripgrep" },
	{ on = "<C-s>",     run = "escape --search",             desc = "Cancel the ongoing search" },
	{ on = "z",         run = "plugin fzf",                  desc = "Jump to a file/directory via fzf" },
	{ on = "Z",         run = "plugin zoxide",               desc = "Jump to a directory via zoxide" },
	
	# Linemode
	{ on = [ "m", "S" ], run = "linemode size",        desc = "Linemode: size" },
	{ on = [ "m", "P" ], run = "linemode permissions", desc = "Linemode: permissions" },
	{ on = [ "m", "B" ], run = "linemode btime",       desc = "Linemode: btime" },
	{ on = [ "m", "M" ], run = "linemode mtime",       desc = "Linemode: mtime" },
	{ on = [ "m", "O" ], run = "linemode owner",       desc = "Linemode: owner" },
	{ on = [ "m", "N" ], run = "linemode none",        desc = "Linemode: none" },
	{ on = [ "m", "q" ], run = 'shell --block "/Users/aaravshah2975/.config/radiant-player/dashboard.sh"', desc = "Enter the Highstorm Dashboard", block = true },
	{ on = [ "m", "a", "s" ], run = 'shell --block "/Users/aaravshah2975/.config/radiant-player/add_spotify_prompt.sh"', desc = "Add Spotify URI to queue" },
	{ on = [ "m", "s" ], run = "redraw", desc = "Refresh Stormlight" },
	{ on = ["m", "p"], run = 'shell "/Users/aaravshah2975/.config/radiant-player/control.sh toggle"',  desc = "Infuse/Extinguish Stormlight" },
	{ on = ["m", "n"], run = 'shell "/Users/aaravshah2975/.config/radiant-player/control.sh next"', desc = "Lash Forward" },
	{ on = ["m", "b"], run = 'shell "/Users/aaravshah2975/.config/radiant-player/control.sh prev"', desc = "Lash Backward" },
	{ on = ["m", "r"], run = 'shell "/Users/aaravshah2975/.config/radiant-player/queue.py loop"', desc = "Swear New Loop Oath" },

	
	# Copy
	{ on = [ "c", "c" ], run = "copy path",             desc = "Copy the file path" },
	{ on = [ "c", "d" ], run = "copy dirname",          desc = "Copy the directory path" },
	{ on = [ "c", "f" ], run = "copy filename",         desc = "Copy the filename" },
	{ on = [ "c", "n" ], run = "copy name_without_ext", desc = "Copy the filename without extension" },
	{ on = [ "c", "m" ], run = "plugin chmod",          desc = "Chmod on files"},
	
	# Filter & Find
	{ on = "f", run = "plugin fg", desc = "Find file by content (ripgrep)" },
	{ on = "F", run = "plugin fg --args='fzf'", desc = "Find file by name (fzf)" },
	{ on = "<C-f>", run = "filter --smart", desc = "Filter files" },

	# Find
	{ on = "/", run = "find --smart",            desc = "Find next file" },
	{ on = "?", run = "find --previous --smart", desc = "Find previous file" },
	{ on = "n", run = "find_arrow",              desc = "Next found" },
	{ on = "N", run = "find_arrow --previous",   desc = "Previous found" },

	# Sorting
	{ on = [ ",", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime" ],  desc = "Sort by modified time" },
	{ on = [ ",", "M" ], run = [ "sort mtime --reverse=yes", "linemode mtime" ], desc = "Sort by modified time (reverse)" },
	{ on = [ ",", "b" ], run = [ "sort btime --reverse=no", "linemode btime" ],  desc = "Sort by birth time" },
	{ on = [ ",", "B" ], run = [ "sort btime --reverse=yes", "linemode btime" ], desc = "Sort by birth time (reverse)" },
	{ on = [ ",", "e" ], run = "sort extension --reverse=no",                    desc = "Sort by extension" },
	{ on = [ ",", "E" ], run = "sort extension --reverse=yes",                   desc = "Sort by extension (reverse)" },
	{ on = [ ",", "a" ], run = "sort alphabetical --reverse=no",                 desc = "Sort alphabetically" },
	{ on = [ ",", "A" ], run = "sort alphabetical --reverse=yes",                desc = "Sort alphabetically (reverse)" },
	{ on = [ ",", "n" ], run = "sort natural --reverse=no",                      desc = "Sort naturally" },
	{ on = [ ",", "N" ], run = "sort natural --reverse=yes",                     desc = "Sort naturally (reverse)" },
	{ on = [ ",", "s" ], run = [ "sort size --reverse=no", "linemode size" ],    desc = "Sort by size" },
	{ on = [ ",", "S" ], run = [ "sort size --reverse=yes", "linemode size" ],   desc = "Sort by size (reverse)" },
	{ on = [ ",", "r" ], run = "sort random --reverse=no",                       desc = "Sort randomly" },

	# Goto
	{ on = [ "g", "A" ], run = "cd \"~/Documents/Personal/Audiobooks\"", desc = "Go Audiobooks"},
	{ on = [ "g", "a" ],       run = "cd \"~/aaravshah0011@gmail.com - Google Drive\"",  desc = "Go AS"},
	{ on = [ "g", "B" ],       run = "cd \"~/f20231325@pilani.bits-pilani.ac.in - Google Drive\"", desc = "Go BITS"},
	{ on = [ "g", "b" ],       run = "cd \"~/Documents/Personal/Books\"", desc = "Go Books"},
	{ on = [ "g", "c" ],       run = "cd ~/.config",     desc = "Go ~/.config" },
	{ on = [ "g", "D" ],       run = "cd ~/Downloads",   desc = "Go ~/Downloads" },
	{ on = [ "g", "d" ],       run = "cd ~/Documents",   desc = "Go ~/Documents" },
	{ on = [ "g", "f" ],       run = "follow",           desc = "Follow hovered symlink" },
	# Version Control & Process Management
    { on = [ "g", "G" ], run = 'shell "lazygit" --block', desc = "Open lazygit" },
    { on = [ "g", "h" ],       run = "cd ~",             desc = "Go home" },
    { on = [ "g", "k" ], run = 'shell "pkill -9 mpv; pkill -9 VLC" --block', desc = "Kill all media processes" },
    { on = [ "g", "L" ], run = 'shell "~/.local/bin/lazyGit-lister.sh" --block --confirm', desc = "fzf for LazyGit"},
	{ on = [ "g", "l" ],       run = "cd ~/.local/bin",  desc = "Go ~/.local/bin"},
	{ on = [ "g", "m" ], run = "cd \"~/Documents/Personal/Yt-Music\"", desc = "Go Yt-Music"},
	{ on = [ "g", "v" ], run = "cd \"~/Documents/Personal/Yt-Videos\"", desc = "Go Yt-Videos"},
	

	# Help
    { on = [ "g", "?" ],         run = 'shell "bat ~/.config/yazi/keymap.toml | fzf --height 40% --reverse" --block', desc = "Peek at keymap" },
    { on = [ "g", "<Space>" ], run = "cd --interactive", desc = "Jump interactively" },
	
	# Tabs & UI
	{ on = "T", run = "tab_create --current", desc = "Create a new tab with CWD" },
	{ on = "M", run = "plugin max-preview", desc = "Maximize or restore the preview pane" },
	{ on = "N", run = "plugin syl-notify", desc = "Seek wisdom from Sylphrena" },

	{ on = "1", run = "tab_switch 0", desc = "Switch to first tab" },
	{ on = "2", run = "tab_switch 1", desc = "Switch to second tab" },
	{ on = "3", run = "tab_switch 2", desc = "Switch to third tab" },
	{ on = "4", run = "tab_switch 3", desc = "Switch to fourth tab" },
	{ on = "5", run = "tab_switch 4", desc = "Switch to fifth tab" },
	{ on = "6", run = "tab_switch 5", desc = "Switch to sixth tab" },
	{ on = "7", run = "tab_switch 6", desc = "Switch to seventh tab" },
	{ on = "8", run = "tab_switch 7", desc = "Switch to eighth tab" },
	{ on = "9", run = "tab_switch 8", desc = "Switch to ninth tab" },

	{ on = "[", run = "tab_switch -1 --relative", desc = "Switch to previous tab" },
	{ on = "]", run = "tab_switch 1 --relative",  desc = "Switch to next tab" },

	{ on = "{", run = "tab_swap -1", desc = "Swap current tab with previous tab" },
	{ on = "}", run = "tab_swap 1",  desc = "Swap current tab with next tab" },

	# Simple - Tags
	#─────────────────────────── TOGGLE TAG(S) ────────────────────────────
    # Toggle a tag (press any tag key)
    # A tag hint window will show up.
    # Simply press any tag key to toggle that tag for selected or hovered files/folders.
    { on = [ "t", "t", "k" ], run = "plugin simple-tag -- toggle-tag", desc = "Toggle a tag" },

    # Toggle tag(s) with value from input box.
    # A tag hint window and an input box will show up.
    # Simply input tag key(s) to toggle that tags for selected or hovered files/folders.
    # Do not input any delimiter.
    { on = [ "t", "t", "i" ], run = "plugin simple-tag -- toggle-tag --input", desc = "Toggle tag(s) input box" },

    # Simply press any new tag key to add to selected or hovered files/folders.
    { on = [ "t", "a", "k" ], run = "plugin simple-tag -- add-tag", desc = "Add a tag" },

    # A tag hint window and an input box will show up.
    # Simply input new tag key(s) to add to selected or hovered files/folders.
    # Do not input any delimiter.
    { on = [ "t", "a", "i" ], run = "plugin simple-tag -- add-tag --input", desc = "Add tag(s) input box" },

    # Simply press any tag key to be removed from selected or hovered files/folders.
    { on = [ "t", "d", "k" ], run = "plugin simple-tag -- remove-tag", desc = "Remove a tag" },

    # Do not input any delimiter.
    { on = [ "t", "d", "i" ], run = "plugin simple-tag -- remove-tag --input", desc = "Remove tag(s) input box" },

    # Simply press any new tag key to filter files/folders containing that tag in current directory.
    { on = [ "t", "f" ], run = "plugin simple-tag -- filter", desc = "Filter files/folders by a tag" },

    # For example: Input value or --keys=!1q -> filter any files/folders contain all of these tags (! and 1 and q) in current directory.
    { on = [ "t", "F" ], run = "plugin simple-tag -- filter --input", desc = "Filter files/folders by tag(s) (input box)" },

    #  ─────────────────────── VISUAL SELECT FILES/FOLDERS BY TAGS: ───────────────────────

    # Available selection actions:
    # replace → Replaces the current selection list with files/folders that have the selected tag.
    # unite → Combines the currently selected files/folders with those that have the selected tag.
    # intersect → Keeps only the files/folders that are present in both the current selection and the tagged items.
    # subtract → Deselects files/folders that have the selected tag from the current selection.
    # exclude → Combines the currently selected files/folders with the tagged items, then deselects any overlapping items between the current selection and the tagged items.
    # undo → Undos or redoes the last selection action.

    # which_key will popup to choose selection mode
    # And a tag hint window will show up.
    # Simply select a selection mode then press any tag key to select files/folders
    { on = [ "t", "s", "t" ], run = "plugin simple-tag -- toggle-select", desc = "Select a selection action then select a tag key (toggle-select)" },

    # Run action on files/folders by a tag.
    # A tag hint window will show up.
    # Simply press any tag key to do the following action:
    { on = [ "t", "s", "r" ], run = "plugin simple-tag -- replace-select", desc = "replace-select" },
    { on = [ "t", "s", "u" ], run = "plugin simple-tag -- unite-select", desc = "unite-select" },
    { on = [ "t", "s", "i" ], run = "plugin simple-tag -- intersect-select", desc = "intersect-select" },
    { on = [ "t", "s", "s" ], run = "plugin simple-tag -- subtract-select", desc = "subtract-select" },
    { on = [ "t", "s", "e" ], run = "plugin simple-tag -- exclude-select", desc = "exclude-select" },

    # Run action on files/folders by tag(s) with value from input box.
    # A tag hint window will show up.
    # Simply input tag key(s) to do the following action:
    { on = [ "t", "s", "R" ], run = "plugin simple-tag -- replace-select --input", desc = "replace-select --input" },
    { on = [ "t", "s", "U" ], run = "plugin simple-tag -- unite-select --input", desc = "unite-select --input" },
    { on = [ "t", "s", "I" ], run = "plugin simple-tag -- intersect-select --input", desc = "intersect-select --input" },
    { on = [ "t", "s", "S" ], run = "plugin simple-tag -- subtract-select --input", desc = "subtract-select --input" },
    { on = [ "t", "s", "E" ], run = "plugin simple-tag -- exclude-select --input", desc = "exclude-select --input" },
    
	# Mac - Tags
	#{ on   = [ "b", "a" ], run  = "plugin mactag add", desc = "Tag selected files"},
	#{ on   = [ "b", "r" ], run  = "plugin mactag remove", desc = "Untag selected files"},
	
	# Tasks
	{ on = "w", run = "tasks:show", desc = "Show task manager" },

	# Help
	{ on = "~",    run = "help", desc = "Open help" },
	{ on = "<F1>", run = "help", desc = "Open help" },
]


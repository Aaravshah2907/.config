[manager]
# Border: Sapphire Glow of Stormlight
border_symbol = "│"
border_style  = { fg = "#00BFFF" } 

[status]
# Progress bar and status icons
separator_open  = ""
separator_close = ""
main_css = { fg = "#ffffff", bg = "#004488" }
alt_css  = { fg = "#ffffff", bg = "#708090" } # Slate

[help]
# Column 1 (Keys): Honor's Gold
on_css      = { fg = "#FFD700", bold = true }
# Column 2 (Commands): Stormlight Sapphire
run_css     = { fg = "#00BFFF" }
# Column 3 (Description): Pure White
desc_css    = { fg = "#ffffff" }
# Hover: Deep Windrunner Blue background
hovered_css = { fg = "#ffffff", bg = "#003366", bold = true }
# Footer: Gold and Sapphire
footer_css  = { fg = "#ffffff", bg = "#00BFFF" }

[input]
border_style = { fg = "#00BFFF" }
title_style  = { fg = "#FFD700", bold = true }

[select]
border_style = { fg = "#00BFFF" }
active_style = { fg = "#FFD700", bold = true }

[notify]
# Notification Toast: Windrunner Sapphire and Gold
title_info  = { fg = "#00BFFF", bold = true }
title_warn  = { fg = "#FFD700", bold = true }
title_error = { fg = "#ff5555", bold = true }

icon_info  = "󱐌" # Sylphrena (Windspren)
icon_warn  = "󰊠" # Infused Gemstone
icon_error = "󱐋" # Highstorm Bolt

[manager]
ratio = [2, 4, 4]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
linemode = "none"
show_hidden = true
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]
title_format = "📁Terminal File Viewer: {cwd}"

[preview]
wrap = "yes"
tab_size = 4
max_width = 1000
max_height = 1200
cache_dir = ""
image_delay = 30
image_filter = "triangle"
image_quality = 75
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
    { run = "${EDITOR:-nano} %s", desc = "$EDITOR", for = "unix", block = true },
    { run = "code %s", desc = "code", for = "windows", orphan = true },
    { run = "code -w %s", desc = "code (block)", for = "windows", block = true },
]
play = [
    { run = '/opt/homebrew/bin/python3 /Users/aaravshah2975/.config/radiant-player/queue.py play "$@"', desc = "Add to Queue", for = "macos", orphan = true },
    { run = '/Users/aaravshah2975/.config/radiant-player/fzf-interface.sh', desc = "Edit Queue", for = "macos", block = true },
    { run = "xdg-open %s1", desc = "Play", for = "linux", orphan = true },
    { run = 'start "" %s1', desc = "Play", for = "windows", orphan = true },
    { run = "termux-open %s1", desc = "Play", for = "android" },
    { run = "mediainfo %s1; echo 'Press enter to exit'; read _", block = true, desc = "Show media info", for = "unix" },
    { run = "mediainfo %s1 & pause", block = true, desc = "Show media info", for = "windows" },
]
open = [
    { run = "xdg-open %s1", desc = "Open", for = "linux" },
    { run = "open %s", desc = "Open", for = "macos" },
    { run = 'start "" %s1', desc = "Open", for = "windows", orphan = true },
    { run = "termux-open %s1", desc = "Open", for = "android" },
]
reveal = [
    { run = "xdg-open %d1", desc = "Reveal", for = "linux" },
    { run = "open -R %s1", desc = "Reveal", for = "macos" },
    { run = "explorer /select,%s1", desc = "Reveal", for = "windows", orphan = true },
    { run = "termux-open %d1", desc = "Reveal", for = "android" },
    # { run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "Show EXIF", for = "unix", block = true },
]
extract = [{ run = "ya pub extract --list %s", desc = "Extract here" }]
download = [
    { run = "ya emit download --open %S", desc = "Download and open" },
    { run = "ya emit download %S", desc = "Download" },
]
vlc = [
    { run = '"/Applications/VLC.app/Contents/MacOS/VLC" %*', desc = "Open in VLC", for = "macos", orphan = true },
]
playlist = [
    { run = '/opt/homebrew/bin/python3 /Users/aaravshah2975/.config/radiant-player/queue.py load %*', desc = "Load Playlist", for = "macos", orphan = true },
]
spotify_add = [
    { run = '/bin/zsh -lc "uri=$(awk \"NF{print; exit}\" \"$1\"); /opt/homebrew/bin/python3 /Users/aaravshah2975/.config/radiant-player/queue.py add_spotify \"$uri\""', desc = "Add Spotify URI to queue", for = "macos", orphan = true },
]

[open]
rules = [
    # Folder
    { url = "*/", use = [
        "edit",
        "open",
        "reveal",
    ] },
    # Text
    { mime = "text/*", use = [
        "edit",
        "reveal",
    ] },
    # Image
    { mime = "image/*", use = [
        "open",
        "reveal",
    ] },
    # Audio
    { mime = "audio/*", use = [
        "play",
        "reveal",
    ] },
    # Video
    { mime = "video/*", use = [
        "vlc",
        "reveal",
    ] },
    # Archive
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [
        "extract",
        "reveal",
    ] },
    # JSON
    { mime = "application/{json,ndjson}", use = [
        "edit",
        "reveal",
    ] },
    { mime = "*/javascript", use = [
        "edit",
        "reveal",
    ] },
    # Empty file
    { mime = "inode/empty", use = [
        "edit",
        "reveal",
    ] },
    # Virtual file system
    { mime = "vfs/{absent,stale}", use = "download" },
    # Fallback
    { url = "*", use = [
        "open",
        "reveal",
    ] },
    # Playlist
    { mime = "*.m3u", use = [
        "playlist",
    ] },
    # Spotify pointer files
    { mime = "*.spotify", use = [
        "spotify_add",
    ] },
    { mime = "*.spot", use = [
        "spotify_add",
    ] },
]

[tasks]
micro_workers = 10
macro_workers = 10
bizarre_retry = 3
image_alloc = 536870912      # 512MB
image_bound = [10000, 10000]
suppress_preload = false

[plugin]
prepend_previewers = [
    { mime = "audio/*", run = "exifaudio", group = "preview" },
    { url = '**/.git/', run = 'preview-git', group = "preview" },
    { mime = '', run = 'preview-epub', group = "preview" },
]
prepend_fetchers = [
    #{id  = "mactag", url = "*/", run = "mactag", group = "tag" },
    #{id  = "mactag", url = "*/", run = "mactag", group = "tag" },
    { id = "simple-tag", url = "*", run = "simple-tag", group = "tag" },
    { id = "simple-tag", url = "*/", run = "simple-tag", group = "tag" },
]
fetchers = [
    # Mimetype
    { id = "mime", url = "*/", run = "mime.dir", prio = "high", group = "mime" },
    { id = "mime", url = "local://*", run = "mime.local", prio = "high", group = "mime" },
    { id = "mime", url = "remote://*", run = "mime.remote", prio = "high", group = "mime" },
]
spotters = [
    #{ url = "*/", run = "folder", group = "folder" }, # use default
    { url = "*/", run = "spot", group = "folder" },
    # Code
    { mime = "text/*", run = "code", group = "code" },
    { mime = "application/{mbox,javascript,wine-extension-ini}", run = "code", group = "code" },
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick", group = "image" },
    { mime = "image/svg+xml", run = "svg", group = "image" },
    { mime = "image/*", run = "image", group = "image" },
    # Audio
    { mime = 'audio/mpegurl', run = 'file', group = "audio" },
    { mime = "audio/*", run = "spot-audio", group = "audio" },
    # Video
    { mime = "video/*", run = "spot-video", group = "video" },
    # Virtual file system
    { mime = "vfs/*", run = "vfs", group = "vfs" },
    # Error
    { mime = "null/*", run = "null", group = "null" },
    # Fallback
    # { url = "*", run = "file", group = "file" }, # Default
    { url = "*", run = "spot", group = "file" },
]
preloaders = [
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick", group = "image" },
    { mime = "image/svg+xml", run = "svg", group = "image" },
    { mime = "image/*", run = "image", group = "image" },
    # Video
    { mime = "video/*", run = "video", group = "video" },
    # PDF
    { mime = "application/pdf", run = "pdf", group = "pdf" },
    # Font
    { mime = "font/*", run = "font", group = "font" },
    { mime = "application/ms-opentype", run = "font", group = "font" },
    # Epubs
    { mime = '', run = 'preview-epub', group = "preview-epub" },
]
previewers = [
    { url = "*/", run = "folder", group = "folder" },
    # Code
    { mime = "text/*", run = "code", group = "code" },
    { mime = "application/{mbox,javascript,wine-extension-ini}", run = "code", group = "code" },
    # JSON
    { mime = "application/{json,ndjson}", run = "json", group = "json" },
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick", group = "image" },
    { mime = "image/svg+xml", run = "svg", group = "image" },
    { mime = "image/*", run = "image", group = "image" },
    # Video
    { mime = "video/*", run = "video", group = "video" },
    # PDF
    { mime = "application/pdf", run = "pdf", group = "pdf" },
    # Archive
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive", group = "archive" },
    { mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive", group = "archive" },
    { url = "*.{AppImage,appimage}", run = "archive", group = "archive" },
    # Virtual Disk / Disk Image
    { mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive", group = "archive" },
    { mime = "application/virtualbox-{vhd,vhdx}", run = "archive", group = "archive" },
    { url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive", group = "archive" },
    # Font
    { mime = "font/*", run = "font", group = "font" },
    { mime = "application/ms-opentype", run = "font", group = "font" },
    # Empty file
    { mime = "inode/empty", run = "empty", group = "empty" },
    # Virtual file system
    { mime = "vfs/*", run = "vfs", group = "vfs" },
    # Error
    { mime = "null/*", run = "null", group = "null" },
    # Fallback
    { url = "*", run = "file", group = "file" },
]

[input]
cursor_blink = false

# cd
cd_title = "Change directory:"
cd_origin = "top-center"
cd_offset = [0, 2, 50, 3]

# create
create_title = ["Create:", "Create (dir):"]
create_origin = "top-center"
create_offset = [0, 2, 50, 3]

# rename
rename_title = "Rename:"
rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

# filter
filter_title = "Filter:"
filter_origin = "top-center"
filter_offset = [0, 2, 50, 3]

# find
find_title = ["Find next:", "Find previous:"]
find_origin = "top-center"
find_offset = [0, 2, 50, 3]

# search
search_title = "Search via {n}:"
search_origin = "top-center"
search_offset = [0, 2, 50, 3]

# shell
shell_title = ["Shell:", "Shell (block):"]
shell_origin = "top-center"
shell_offset = [0, 2, 50, 3]

[confirm]
# trash
trash_title = "Trash {n} selected file{s}?"
trash_origin = "center"
trash_offset = [0, 0, 70, 20]

# delete
delete_title = "Permanently delete {n} selected file{s}?"
delete_origin = "center"
delete_offset = [0, 0, 70, 20]

# overwrite
overwrite_title = "Overwrite file?"
overwrite_body = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [0, 0, 50, 15]

# quit
quit_title = "Quit?"
quit_body = "The following tasks are still running, are you sure you want to quit?"
quit_origin = "center"
quit_offset = [0, 0, 50, 15]

[pick]
open_title = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by = "none"
sort_sensitive = false
sort_reverse = false
sort_translit = false
